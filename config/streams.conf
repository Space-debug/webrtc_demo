# webrtc_demo 推流端配置（KEY=value）
# 启动：webrtc_push_demo --config <本文件> [stream_id] [camera]
# 无前缀 = 各路的默认值；一路要单独改某项 → 加 STREAM_路名_键=值（见文末示例）
# 路名须与信令、订阅端一致。亦可 ./scripts/push.sh
#
# 说明：拉流（webrtc_pull_demo）若用 --config 指向本文件，仅会读取与信令/订阅一致
# 的项（如 SIGNALING_ADDR、STREAM_ID）；拉流行为请用命令行与环境变量。

# --- 信令 ---
# START_SIGNALING / AUTO_LOCAL_ROUTE 仅 scripts/push.sh 使用
SIGNALING_ADDR=127.0.0.1:8765
START_SIGNALING=1
AUTO_LOCAL_ROUTE=1

# --- 视频（多路共用下面的数；仅当某路不同才额外写 STREAM_那路名_键）---
# 采集分辨率与帧率：默认固定 720p（1280×720）30fps；与设备协商不一致时推流日志会提示改 WIDTH/HEIGHT 对齐
WIDTH=1280
HEIGHT=720
FPS=30

# 采集：预热秒数；建 Offer 前至少帧数、最长等待秒（0 = 关闭门限）
# 可用环境变量 WEBRTC_CAPTURE_GATE_* 覆盖；略降可加快首连，弱网或编码未稳时请酌情调回
CAPTURE_WARMUP_SEC=3
CAPTURE_GATE_MIN_FRAMES=30
CAPTURE_GATE_MAX_WAIT_SEC=18

# 码率：vbr | cbr（cbr 时 min=max=target），单位 kbps
# 网络差时 DEGRADATION：maintain_framerate | maintain_resolution | balanced（弱网兼顾画质与流畅时建议 balanced）
# 以下为「峰值 <1Mbps」窄带档：静止尚可，大运动易糊；可配合降分辨率/FPS
BITRATE_MODE=vbr
TARGET_BITRATE=500
MIN_BITRATE=250
MAX_BITRATE=800
DEGRADATION_PREFERENCE=balanced

# 发送端 ICE：优先探测更可能连通的候选对（多网卡/弱网时更快切到可用链路），1=开
ICE_PRIORITIZE_LIKELY_PAIRS=1
# 发送端 RTP DSCP 优先级：very_low | low | medium | high（路由器支持时有利于实时媒体）
VIDEO_NETWORK_PRIORITY=high
# 编码最大帧率上限，0 表示与 FPS 一致；与 720p@30 采集对齐时请设为 30
VIDEO_ENCODING_MAX_FPS=30

# RK3588 等：USE_ROCKCHIP_MPP_H264=1 且系统有 librockchip_mpp 时，H.264 优先硬件编码；失败自动回退 OpenH264。
# 临时关闭硬件编码：0 或环境变量 WEBRTC_DISABLE_MPP_H264=1
USE_ROCKCHIP_MPP_H264=1
# 直采 MJPEG 时：MPP 硬件解码为 NV12 再转 I420；0=仅用 libyuv 软解。
# 与 USE_ROCKCHIP_MPP_H264=1 同时开启时，默认会关闭 MPP MJPEG（旧 BSP 同进程双 MPP 易崩）。
# 整链：V4L2 MJPEG → MPP 硬解（NV12）→ MPP 硬编 H.264 → WebRTC；板端请先 ./scripts/e2e_headless_once.sh 验证。
# 旧 BSP 同进程双 MPP 不稳时可改 0，或仅用环境变量临时关闭：WEBRTC_DUAL_MPP_MJPEG_H264=0
USE_ROCKCHIP_MPP_MJPEG_DECODE=1
USE_DUAL_MPP_MJPEG_H264=1

# MJPEG 直采队列：1=只保留最新一帧压缩数据（降延迟，运动场景易丢帧）；0=FIFO，满则丢最旧
# MJPEG_QUEUE_MAX：非 latest-only 时队列深度上限；实际不超过 V4L2_BUFFER_COUNT-1（延迟 QBUF 路径）
# V4L2_BUFFER_COUNT：MMAP 缓冲个数，低延迟常用 2；须 ≥2
# V4L2_POLL_TIMEOUT_MS：无帧时 poll 间隔，有数据即返回
# NV12_POOL_SLOTS：MPP→NV12 环形缓冲个数（4～16）
# 环境变量：WEBRTC_MJPEG_*、WEBRTC_NV12_POOL_SLOTS、WEBRTC_V4L2_BUFFER_COUNT、WEBRTC_V4L2_POLL_TIMEOUT_MS
MJPEG_QUEUE_LATEST_ONLY=1
MJPEG_QUEUE_MAX=2
V4L2_BUFFER_COUNT=2
V4L2_POLL_TIMEOUT_MS=50
NV12_POOL_SLOTS=6

# 编码：h264 | h265 | vp8 | vp9 | av1
# H264_PROFILE：baseline|main|high，已接入 SetCodecPreferences（按 profile-level-id 前 2 位匹配）
# H264_LEVEL / KEYFRAME_INTERVAL：当前不修改 libwebrtc 编码器 GOP；保留作将来扩展
VIDEO_CODEC=h264
H264_PROFILE=main
H264_LEVEL=3.0
KEYFRAME_INTERVAL=0

# --- 主路设备（两处 livestream 须相同：上面决定「默认路名」，下面决定该路摄像头）---
STREAM_ID=livestream
STREAM_livestream_CAMERA=/dev/video11

# --- 第二路示例：启动 … cam2 时生效；只改摄像头一般只开 CAMERA 一行 ---
# STREAM_cam2_CAMERA=/dev/video13
# STREAM_cam2_TARGET_BITRATE=1500
