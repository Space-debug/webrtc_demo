# webrtc_demo 推流配置（KEY=value）
# 启动：webrtc_push_demo --config <本文件> [stream_id] [camera]
# 无前缀 = 各路的默认值；一路要单独改某项 → 加 STREAM_路名_键=值（见文末示例）
# 路名须与信令、拉流订阅一致。亦可 ./scripts/push.sh

# --- 信令 ---
# 拉流无参时常读 SIGNALING_ADDR
# START_SIGNALING / AUTO_LOCAL_ROUTE 仅 push.sh 使用
SIGNALING_ADDR=127.0.0.1:8765
START_SIGNALING=1
AUTO_LOCAL_ROUTE=1

# --- 视频（多路共用下面的数；仅当某路不同才额外写 STREAM_那路名_键）---

# 音频：1 = SDP 带音频意向（无麦采集）；纯视频保持 0
ENABLE_AUDIO=0

# 采集分辨率与帧率
WIDTH=1280
HEIGHT=720
FPS=30

# 采集：预热秒数；建 Offer 前至少帧数、最长等待秒（0 = 关闭门限）
# 可用环境变量 WEBRTC_CAPTURE_GATE_* 覆盖
CAPTURE_WARMUP_SEC=3
CAPTURE_GATE_MIN_FRAMES=45
CAPTURE_GATE_MAX_WAIT_SEC=25

# GetStats 延时：1 = 开
# 窗长 = 相邻两次采样之间的采集帧数；日志为 Δ累计/Δ帧
# WEBRTC_LATENCY_STATS_PROBE 若设置则覆盖开关
LATENCY_STATS_ENABLE=0
LATENCY_STATS_WINDOW_FRAMES=60

# 码率：vbr | cbr（cbr 时 min=max=target），单位 kbps
# 网络差时 DEGRADATION：maintain_framerate | maintain_resolution | balanced
# 以下为「峰值 <1Mbps」窄带档：静止尚可，大运动易糊；可配合降分辨率/FPS
BITRATE_MODE=vbr
TARGET_BITRATE=500
MIN_BITRATE=250
MAX_BITRATE=800
DEGRADATION_PREFERENCE=maintain_framerate

# 编码：h264 | h265 | vp8 | vp9 | av1
# profile：baseline | main | high；LEVEL 如 3.0
# KEYFRAME_INTERVAL=0 表示自动 GOP
VIDEO_CODEC=h264
H264_PROFILE=main
H264_LEVEL=3.0
KEYFRAME_INTERVAL=0

# FlexFEC：收发须同时设为 1；FIELD_TRIALS 留空用内置
# 亦可 ENABLE_FLEXFEC 环境变量
ENABLE_FLEXFEC=0
FLEXFEC_FIELD_TRIALS=

# --- 主路设备（两处 livestream 须相同：上面决定「默认路名」，下面决定该路摄像头）---
STREAM_ID=livestream
STREAM_livestream_CAMERA=/dev/video11

# --- 第二路示例：启动 … cam2 时生效；只改摄像头一般只开 CAMERA 一行 ---
# STREAM_cam2_CAMERA=/dev/video13
# STREAM_cam2_TARGET_BITRATE=1500
