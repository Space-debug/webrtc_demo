# ============================================================
# WebRTC 推流配置
# 规则：
# 1) 全局 KEY 作为默认值
# 2) STREAM_<stream_id>_<KEY> 覆盖同名全局 KEY
# 3) 当前文件统一只保留 720P@30fps
# ============================================================

# [A] 连接与会话功能
SIGNALING_ADDR=127.0.0.1:8765
SIGNALING_PORT=8765
START_SIGNALING=1
AUTO_LOCAL_ROUTE=1
ENABLE_AUDIO=0

# [B] 采集源选择功能
# DEFAULT_* 仅在未显式传 stream_id/camera 时作为兜底值
DEFAULT_STREAM=livestream
DEFAULT_CAMERA=/dev/video11

# [C] 分辨率与采样速率（统一 720P@30fps）；采集由 libwebrtc 直连 V4L2，格式由库与设备协商。
WIDTH=1280
HEIGHT=720
FPS=30
# 摄像头预热秒数：稳定优先建议 3；若平台稳定再调低
CAPTURE_WARMUP_SEC=3
# 创建 Offer 前采集帧数门限(与轨道 FrameCountingRenderer 同源)，减轻 OpenH264「input fps 0」告警；0=关闭
CAPTURE_GATE_MIN_FRAMES=45
# 等待上述门限的最长时间(秒)；超时则跳过本次 Offer，拉流端需重试连接
CAPTURE_GATE_MAX_WAIT_SEC=25

# [E] 传输带宽控制功能
BITRATE_MODE=vbr
TARGET_BITRATE=2200
MIN_BITRATE=1200
MAX_BITRATE=3500

# [F] WebRTC 自适应降级功能
# maintain_framerate   -> 网络变差优先降分辨率
# maintain_resolution  -> 网络变差优先降帧率
# balanced             -> 分辨率和帧率折中调整
DEGRADATION_PREFERENCE=maintain_resolution

# [G] 编码器功能
VIDEO_CODEC=h264
H264_PROFILE=main
H264_LEVEL=3.0
KEYFRAME_INTERVAL=0
# FlexFEC-03（RTP 层前向纠错，与 H264/VP8 等编码无关）：1=在 LibWebRTC::Initialize 前注入 WEBRTC_FIELD_TRIALS
# 推流与拉流须同时 ENABLE_FLEXFEC=1；留空 FLEXFEC_FIELD_TRIALS 则自动追加默认 trials
ENABLE_FLEXFEC=0
FLEXFEC_FIELD_TRIALS=

# ------------------------------------------------------------
# [H] 单相机流配置（统一 720P@30fps）
# ------------------------------------------------------------
STREAM_livestream_CAMERA=/dev/video11
STREAM_livestream_WIDTH=1280
STREAM_livestream_HEIGHT=720
STREAM_livestream_FPS=30
STREAM_livestream_TARGET_BITRATE=2200
STREAM_livestream_MIN_BITRATE=1200
STREAM_livestream_MAX_BITRATE=3500
STREAM_livestream_DEGRADATION_PREFERENCE=maintain_resolution

# ------------------------------------------------------------
# [I] 多相机流模板（同一信令地址，用不同 stream_id 区分）
# 使用方法：
# 1) 按实际设备修改 *_CAMERA（例如 /dev/video11 /dev/video13 /dev/video15）
# 2) 启动时指定对应 stream_id（如 stream_cam1 / stream_cam2 / stream_cam3）
# 3) 拉流端用同一个 signaling_addr + 对应 stream_id 订阅
# 4) 三路同时推流时：第 1 路 START_SIGNALING=1，后两路 START_SIGNALING=0
# 5) 三路均固定为 720P@30fps
# ------------------------------------------------------------

# [I1] 相机 1（占位模板）
STREAM_stream_cam1_CAMERA=/dev/video11
STREAM_stream_cam1_WIDTH=1280
STREAM_stream_cam1_HEIGHT=720
STREAM_stream_cam1_FPS=30
STREAM_stream_cam1_TARGET_BITRATE=2200
STREAM_stream_cam1_MIN_BITRATE=1200
STREAM_stream_cam1_MAX_BITRATE=3500
STREAM_stream_cam1_DEGRADATION_PREFERENCE=maintain_resolution

# [I2] 相机 2（占位模板）
STREAM_stream_cam2_CAMERA=/dev/video13
STREAM_stream_cam2_WIDTH=1280
STREAM_stream_cam2_HEIGHT=720
STREAM_stream_cam2_FPS=30
STREAM_stream_cam2_TARGET_BITRATE=2200
STREAM_stream_cam2_MIN_BITRATE=1200
STREAM_stream_cam2_MAX_BITRATE=3500
STREAM_stream_cam2_DEGRADATION_PREFERENCE=balanced

# [I3] 相机 3（占位模板）
STREAM_stream_cam3_CAMERA=/dev/video15
STREAM_stream_cam3_WIDTH=1280
STREAM_stream_cam3_HEIGHT=720
STREAM_stream_cam3_FPS=30
STREAM_stream_cam3_TARGET_BITRATE=2200
STREAM_stream_cam3_MIN_BITRATE=1200
STREAM_stream_cam3_MAX_BITRATE=3500
STREAM_stream_cam3_DEGRADATION_PREFERENCE=maintain_resolution
